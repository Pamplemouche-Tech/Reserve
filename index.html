<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pamplemouche - Réserve</title>
    <style>
        :root {
            --pamplemousse: #FF7F50; /* Corail dynamique */
            --fond: #F9F9FB;
            --texte: #2D3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fond);
            color: var(--texte);
            margin: 0;
            display: flex;
        }

        /* Barre latérale (Sidebar) */
        sidebar {
            width: 250px;
            height: 100vh;
            background: white;
            border-right: 1px solid #E0E0E0;
            padding: 20px;
            position: fixed;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--pamplemousse);
            margin-bottom: 40px;
        }

        .menu-item {
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 5px;
        }

        .menu-item:hover {
            background: #FFF0EB;
            color: var(--pamplemousse);
        }

        /* Contenu principal */
        main {
            margin-left: 290px;
            padding: 40px;
            width: 100%;
        }

        .header-reserve {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .grid-fichiers {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .fichier {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: transform 0.2s;
            cursor: pointer;
        }

        .fichier:hover {
            transform: translateY(-5px);
            border: 1px solid var(--pamplemousse);
        }

        .icon-doc {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .btn-upload {
            background: var(--pamplemousse);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<sidebar>
    <div class="logo">🍊 Réserve</div>
    <div class="menu-item">📂 Mes Fichiers</div>
    <div class="menu-item">🕒 Récents</div>
    <div class="menu-item">⭐ Favoris</div>
    <div class="menu-item">🗑️ Corbeille</div>
    <hr style="border: 0.5px solid #eee; margin: 20px 0;">
    <div style="font-size: 0.8em; color: gray;">Espace : 12 Go / 50 Go</div>
</sidebar>

<main>
    <div class="header-reserve">
        <h1>Bienvenue dans votre Réserve</h1>
        <button class="btn-upload">+ Ajouter un fichier</button>
      <input type="file" id="fileInput" style="display: none;" />
    </div>

    <div class="grid-fichiers">
        <div class="fichier">
            <div class="icon-doc">📑</div>
            <div>Contrat_Pépins.pdf</div>
        </div>
        <div class="fichier">
            <div class="icon-doc">🖼️</div>
            <div>Logo_Zeste.png</div>
        </div>
        <div class="fichier">
            <div class="icon-doc">📊</div>
            <div>Budget_2026.xlsx</div>
        </div>
    </div>
</main>
<script>
  const btnUpload = document.querySelector('.btn-upload');
const fileInput = document.getElementById('fileInput');
const gridFichiers = document.querySelector('.grid-fichiers');

// 1. Déclencher le clic sur l'input caché
btnUpload.addEventListener('click', () => {
    fileInput.click();
});

// 2. Écouter quand un fichier est sélectionné
fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    
    if (file) {
        ajouterFichierALaGrille(file.name);
    }
});

// 3. Fonction pour créer l'élément visuel
function ajouterFichierALaGrille(nom) {
    // On crée la div du fichier
    const nouvelleDiv = document.createElement('div');
    nouvelleDiv.classList.add('fichier');

    // On détermine l'émoji selon l'extension (optionnel mais stylé)
    let emoji = "📄";
    if(nom.endsWith('.png') || nom.endsWith('.jpg')) emoji = "🖼️";
    if(nom.endsWith('.pdf')) emoji = "📑";

    // On remplit la div avec le même HTML que tes exemples
    nouvelleDiv.innerHTML = `
        <div class="icon-doc">${emoji}</div>
        <div>${nom}</div>
    `;

    // On l'ajoute au début de la grille
    gridFichiers.prepend(nouvelleDiv);
}
</script>
</body>
</html>
